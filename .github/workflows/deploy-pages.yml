name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build SPA for GitHub Pages
        env:
          # Enables SPA-only mode in vite.config.ts (no SSR, no nitro).
          GITHUB_PAGES: "1"
          # `base_path` from configure-pages: `/` for user/org sites,
          # `/<repo>` for project sites. Add a trailing slash — Vite needs it.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}/
          VITE_BASE_URL: ${{ steps.pages.outputs.base_path }}/
        run: bun run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4