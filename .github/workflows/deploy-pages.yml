name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build static site
        env:
          # `github-pages` = nitro preset that prerenders every route,
          # writes `.nojekyll` and outputs a pure static site.
          NITRO_PRESET: github-pages
          # BASE_PATH is derived from the Pages config. For user/org sites
          # (`<user>.github.io`) it will be `/`; for project sites it will be
          # `/<repo>/`. Pass through both as build-time and Vite envs.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}/
          VITE_BASE_URL: ${{ steps.pages.outputs.base_path }}/
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4